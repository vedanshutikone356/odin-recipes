<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Pasta Recipe</title>
  </head>
  <body>
    <h1>Pasta</h1>

    <h2>Description</h2>
    <p>A delicious classic pasta dish perfect for any occasion.</p>

    <h2>Ingredients</h2>
    <ul>
      <li>Pasta</li>
      <li>Tomato sauce</li>
      <li>Cheese</li>
      <li>Salt</li>
      <li>Olive oil</li>
    </ul>

    <h2>Steps</h2>
    <ol>
      <li>Boil water and add salt</li>
      <li>Cook pasta for 10 minutes</li>
      <li>Add tomato sauce and mix</li>
      <li>Top with cheese and serve</li>
    </ol>
  </body>
</html>
